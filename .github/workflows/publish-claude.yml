name: Publish Claude Release

on:
  push:
    tags:
      - "claude@v*"

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    if: github.event.repository.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile
      - name: Copy package README files for publish
        run: cp README.* packages/claude-code-plugin/
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@latest
      - name: Validate Claude plugin
        working-directory: packages/claude-code-plugin
        run: claude plugin validate . --strict
      - name: Check Claude npm package contents
        working-directory: packages/claude-code-plugin
        run: npm pack --dry-run
      - name: Publish Claude plugin
        working-directory: packages/claude-code-plugin
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
